<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>节拍器</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root { --cyan:#4dc9f6; --cyan-glow:rgba(77,201,246,0.5); --accent-gold:#f5c362; --beat-red:#ff5e7a; --text:#e8e8f0; --text-dim:#8899bb; }
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:radial-gradient(ellipse at 50% 35%,rgba(30,60,140,0.6) 0%,transparent 65%),#0a0a28;
  color:var(--text);display:flex;justify-content:center;align-items:center;
  min-height:100vh;min-height:100dvh;user-select:none;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
}
.container{width:100%;max-width:420px;padding:20px 24px 32px;display:flex;flex-direction:column;align-items:center}

.top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 8px}
.top-bar .brand{font-size:15px;font-weight:600;color:#7dd8f8;letter-spacing:1px}
.subtitle{font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-bottom:10px}

/* 表盘 */
.dial-wrapper{position:relative;width:270px;height:270px;margin-bottom:18px;touch-action:none}
.dial-outer{position:absolute;inset:0;border-radius:50%;
  background:
    repeating-conic-gradient(from 0deg,rgba(255,255,255,0.06) 0deg 1deg,transparent 1deg 6deg),
    repeating-conic-gradient(from 15deg,rgba(255,255,255,0.12) 0deg 1.5deg,transparent 1.5deg 30deg),
    conic-gradient(from 210deg,rgba(25,30,70,0.95),rgba(35,50,100,0.85),rgba(45,65,130,0.75),rgba(35,50,100,0.85),rgba(25,30,70,0.95),rgba(20,25,55,0.95),rgba(25,30,70,0.95),rgba(35,50,100,0.85),rgba(45,65,130,0.75),rgba(35,50,100,0.85),rgba(25,30,70,0.95));
  box-shadow:0 0 70px rgba(30,80,180,0.25),0 0 130px rgba(20,60,160,0.12),inset 0 0 40px rgba(0,0,0,0.3);
  border:2px solid rgba(80,160,220,0.18);
}
.dial-ticks{position:absolute;inset:10px;border-radius:50%;border:1.5px dashed rgba(100,180,220,0.2);pointer-events:none}
.dial-glow{position:absolute;inset:-6px;border-radius:50%;border:3px solid transparent;box-shadow:0 0 25px var(--cyan-glow),inset 0 0 25px var(--cyan-glow);opacity:0.35;transition:opacity 0.06s;pointer-events:none}
.dial-glow.flash{opacity:1}

}
.dial-inner::before{content:'';position:absolute;inset:0;border-radius:50%;background:rgba(10,10,40,0.55);z-index:0}
.dial-inner>*{position:relative;z-index:1}
.dial-indicator{position:absolute;top:14px;left:50%;width:10px;height:10px;margin-left:-5px;
  background:#fff;border-radius:50%;box-shadow:0 0 14px var(--cyan-glow),0 0 28px var(--cyan-glow);
  pointer-events:none;z-index:2;transform-origin:50% 95px;
  transition:transform 0.08s linear;
}
.bpm-number{font-size:68px;font-weight:700;line-height:1;letter-spacing:-3px;
  background:linear-gradient(180deg,#ffffff 0%,#a8d4f8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.bpm-unit{font-size:12px;color:var(--cyan);letter-spacing:4px;margin-top:2px}

/* 节拍点 */
.beat-dots{display:flex;justify-content:center;gap:14px;margin-bottom:20px}
.beat-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all 0.06s}
.beat-dot.strong{border:2px solid rgba(255,255,255,0.2)}
.beat-dot.active{background:var(--beat-red);box-shadow:0 0 14px var(--beat-red),0 0 28px rgba(255,94,122,0.35);transform:scale(1.35)}
.beat-dot.active.strong{background:var(--accent-gold);box-shadow:0 0 18px var(--accent-gold),0 0 36px rgba(245,195,98,0.45);transform:scale(1.45)}

/* 拍号滚轮 */
.picker-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.picker-col{position:relative;width:64px;height:108px;overflow:hidden;touch-action:none}
.picker-list{position:absolute;left:0;right:0;top:36px;transition:transform 0.15s ease-out}
.picker-item{height:36px;line-height:36px;font-size:16px;color:rgba(255,255,255,0.25);text-align:center}
.picker-item.sel{color:#fff;font-size:20px;font-weight:700}

/* 通用 */
.section-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-right:8px}
.section-row{display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.play-btn{width:90px;height:90px;border-radius:50%;border:none;background:linear-gradient(135deg,#1e6fa0,#0d4068);color:#fff;font-size:32px;cursor:pointer;box-shadow:0 0 30px rgba(50,130,200,0.3),0 4px 20px rgba(0,0,0,0.4);transition:all 0.25s;position:relative;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.play-btn::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(100,180,220,0.25);pointer-events:none}
.play-btn:active{transform:scale(0.91)}
.play-btn.playing{background:linear-gradient(135deg,#e04060,#b02040);box-shadow:0 0 40px rgba(220,60,80,0.4),0 4px 20px rgba(0,0,0,0.4)}
.play-btn.playing::after{border-color:rgba(220,80,100,0.35)}
.btn-icon{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
/* ▶ 三角形 */
.btn-icon::before{content:'';display:block;width:0;height:0;border-top:14px solid transparent;border-bottom:14px solid transparent;border-left:22px solid #fff;margin-left:4px}
/* ■ 正方形（暂停） */
.play-btn.playing .btn-icon::before{width:22px;height:22px;border:none;background:#fff;border-radius:4px;margin-left:0}
.bottom-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin:76px 0 0}
.timer-wrap{display:flex;flex-direction:column;align-items:center}
.save-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative}
.save-text{font-size:12px;color:var(--text-dim);margin-top:2px;letter-spacing:1px}

/* 保存卡片 */
.preset-row{position:absolute;bottom:100%;right:0;display:flex;flex-direction:column-reverse;gap:3px;align-items:flex-end;margin-bottom:4px;max-height:130px;overflow-y:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.preset-row::-webkit-scrollbar{display:none}
.preset-card{flex-shrink:0;padding:4px 14px 4px 10px;background:rgba(64,64,96,0.6);border-radius:16px 6px 6px 16px;cursor:pointer;font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,0.06);white-space:nowrap}
.preset-card:active{background:rgba(77,201,246,0.2);color:#fff}
.preset-card .del{display:none}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center}
.confirm-box{background:#1a1a48;border-radius:14px;padding:20px 28px;text-align:center;min-width:200px}
.confirm-box .msg{font-size:14px;color:var(--text);margin-bottom:16px}
.confirm-box .btns{display:flex;gap:12px;justify-content:center}
.confirm-box button{padding:8px 24px;border-radius:18px;border:none;font-size:14px;cursor:pointer}
.confirm-box .btn-del{background:#e04060;color:#fff}
.confirm-box .btn-cancel{background:rgba(255,255,255,0.1);color:var(--text)}
.timer-icon{margin-bottom:2px;opacity:0.7}
.timer{font-size:13px;color:var(--text-dim);font-variant-numeric:tabular-nums;letter-spacing:1px}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar"><span class="brand">🎵 节拍器</span></div>
  <div class="subtitle">METRONOME</div>

  <!-- 表盘 -->
  <div class="dial-wrapper" id="dial">
    <div class="dial-outer"></div>
    <div class="dial-ticks"></div>
    <div class="dial-glow" id="glowRing"></div>
    <div class="dial-inner">
      <div class="dial-indicator" id="indicator"></div>
      <div class="bpm-number" id="bpmNum">120</div>
      <div class="bpm-unit">B P M</div>
    </div>
  </div>

  <!-- 节拍点 -->
  <div class="beat-dots" id="beatDots"></div>

  <div class="picker-wrap">
    <div class="picker-col" id="numCol">
      <div class="picker-list" id="numList"></div>
    </div>
    <span style="font-size:20px;color:var(--text-dim);margin:0 8px;">/</span>
    <div class="picker-col" id="denCol">
      <div class="picker-list" id="denList"></div>
    </div>
  </div>


  <!-- 底部栏：计时器 | 播放 | 保存 -->
  <div class="bottom-bar">
    <div class="timer-wrap">
      <svg class="timer-icon" width="16" height="16" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="15" fill="none" stroke="#8899bb" stroke-width="2"/>
        <line x1="16" y1="10" x2="16" y2="18" stroke="#8899bb" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="17" x2="16" y2="18" stroke="#8899bb" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="timer" id="timer">00:00</div>
    </div>
    <button class="play-btn" id="playBtn"><span class="btn-icon"></span></button>
    <div class="save-wrap" id="saveBtn">
      <div class="preset-row" id="presetRow"></div>
      <svg width="18" height="18" viewBox="0 0 33 34">
        <circle cx="16.4" cy="15" r="15" fill="none" stroke="#8899bb" stroke-width="1.5"/>
        <rect x="9.5" y="14.3" width="14" height="1.4" rx="0.7" fill="#8899bb"/>
        <rect x="9.5" y="14.3" width="14" height="1.4" rx="0.7" fill="#8899bb" transform="rotate(90 16.5 15)"/>
      </svg>
      <div class="save-text">保存</div>
    </div>
  </div>

</div>

const SOUND_PACKS = {
  metronome:{name:'节拍器',accent:'t7.mp3',regular:'-P.wav'},
  wood:{name:'木鱼',accent:'aH.wav',regular:'Jo.mp3'},
  drum:{name:'架子鼓',accent:'Qb.mp3',regular:'oX.mp3'},
  voice:{name:'人声',accent:'great.mp3',regular:'Wm.mp3'},
  synth:{name:'合成音',accent:null,regular:null},
};

class Metronome {
  constructor(){
    this.ctx=null;this.bpm=120;this.beats=4;this.noteVal=4;
    this.beat=0;this.playing=false;this.pack='metronome';
    this.flash=false;this.vib=false;this.nextTime=0;
    this.timer=null;this.look=25;this.ahead=0.1;
    this.buf={};this.loaded=false;
  }
  async initAudio(){
    if(this.loaded)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    const files=new Set();
    for(const p of Object.values(SOUND_PACKS)){files.add(p.accent);files.add(p.regular)}
    const load=async f=>{const r=await fetch(AUDIO_DIR+f);const b=await r.arrayBuffer();this.buf[f]=await this.ctx.decodeAudioData(b)};
    await Promise.all([...files].map(f=>load(f).catch(e=>console.warn(f,e))));
    this.loaded=true;
  }
  ctx_(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();return this.ctx}
  play(accent){
    const c=this.ctx_();if(!c||!this.loaded)return;
    const p=SOUND_PACKS[this.pack];
    const f=accent?p.accent:p.regular;
    if(!f||!this.buf[f]){this._synth(c,accent);return}
    const s=c.createBufferSource();s.buffer=this.buf[f];
    const g=c.createGain();g.gain.value=accent?1:0.5;
    s.connect(g);g.connect(c.destination);
    s.start(this.nextTime);
  }
  _synth(c,a){
    const t=c.currentTime,o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='triangle';o.frequency.setValueAtTime(a?1800:1200,t);
    o.frequency.exponentialRampToValueAtTime(150,t+0.04);
    g.gain.setValueAtTime(a?0.6:0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.start(t);o.stop(t+0.06);
  }
  tick(){
    while(this.nextTime<this.ctx_().currentTime+this.ahead){
      this.play(this.beat===0);
      if(this.onBeat)this.onBeat(this.beat,this.beat===0);
      this.beat=(this.beat+1)%this.beats;
      this.nextTime+=60/this.bpm;
    }
    this.timer=setTimeout(()=>this.tick(),this.look);
  }
  async start(){await this.initAudio();this.ctx_();this.playing=true;this.beat=0;this.nextTime=this.ctx.currentTime+0.05;this.timer=setTimeout(()=>this.tick(),this.look)}
  stop(){this.playing=false;if(this.timer){clearTimeout(this.timer);this.timer=null}this.beat=0}
  async toggle(){if(this.playing){this.stop();return false}await this.start();return true}
  setBpm(v){this.bpm=Math.max(20,Math.min(300,v))}
}

m.stop=()=>{_stop();stopTimer();timerEl.textContent='00:00'};

// --- 拍号滚轮（touch拖拽，开始拖→暂停，松手→恢复）---
const NOTES=[2,4,8,16],IH=36;
const NUM_BASE=Array.from({length:16},(_,i)=>i+1); // 1-16
const DEN_BASE=[...NOTES];

// 生成无限循环列表：N个完整周期，中间夹一个额外首元素让两端无缝
function makeLoop(base,repeats){
  const arr=[];for(let r=0;r<repeats;r++)arr.push(...base);
  return arr;
}
const NUM_ITEMS=makeLoop(NUM_BASE,20); // 320项
const DEN_ITEMS=makeLoop(DEN_BASE,40); // 160项
const NUM_MID=Math.floor(NUM_ITEMS.length/2/NUM_BASE.length)*NUM_BASE.length; // 对齐到周期开头
const DEN_MID=Math.floor(DEN_ITEMS.length/2/DEN_BASE.length)*DEN_BASE.length;

function buildList(el,items,cur){
  el.innerHTML=items.map(v=>`<div class="picker-item" data-v="${v}">${v}</div>`).join('');
}
function snapTo(el,val,noAnim){
  const items=el.querySelectorAll('.picker-item');
  let idx=0;
  for(let i=0;i<items.length;i++){if(+items[i].dataset.v===val){idx=i;break}}
  el.style.transition=noAnim?'none':'transform 0.3s cubic-bezier(0.22,0.61,0.36,1)';
  el.style.transform=`translateY(${-idx*IH}px)`;
  items.forEach(e=>e.classList.toggle('sel',+e.dataset.v===val));
}
function setupPicker(colEl,listEl,items,getVal,setVal,onChange,initOff){
  let down=false,startY=0,startOff=0,curOff=initOff,startTime=0,wasPlaying=false;
  const DRAG_THRESH=8;

  function getY(e){return e.touches?e.touches[0].clientY:e.clientY}
  function apply(listEl,items,off){
    curOff=off;
    let idx=Math.round(-off/IH);
    idx=Math.max(0,Math.min(items.length-1,idx));
    const v=items[idx];
    listEl.style.transition='none';
    listEl.style.transform=`translateY(${-idx*IH}px)`;
    listEl.querySelectorAll('.picker-item').forEach(el=>el.classList.toggle('sel',+el.dataset.v===v));
    return v;
  }

  colEl.addEventListener('touchstart',e=>{
    wasPlaying=m.playing;if(wasPlaying){m.stop();updateBtn(false)}
    down=true;startTime=Date.now();startY=getY(e);
    startOff=curOff; // 用变量不用 DOM
    listEl.style.transition='none';
    e.preventDefault();
  },{passive:false});

  colEl.addEventListener('touchmove',e=>{
    if(!down)return;
    const dy=getY(e)-startY;
    if(Math.abs(dy)<DRAG_THRESH)return;
    let off=startOff+dy;
    const maxOff=0,minOff=-(items.length-1)*IH;
    if(off>maxOff)off=maxOff+(off-maxOff)*0.3;
    if(off<minOff)off=minOff+(off-minOff)*0.3;
    // 直接用变量位置，不从 DOM 读
    curOff=off;
    listEl.style.transform=`translateY(${off}px)`;
    const idx=Math.round(-off/IH);
    const v=items[Math.max(0,Math.min(items.length-1,idx))];
    listEl.querySelectorAll('.picker-item').forEach(el=>el.classList.toggle('sel',+el.dataset.v===v));
    e.preventDefault();
  },{passive:false});

  colEl.addEventListener('touchend',()=>{
    if(!down)return;
    down=false;
    const totalMove=Math.abs(curOff-startOff);
    const isTap=totalMove<DRAG_THRESH&&(Date.now()-startTime)<300;
    let v;
    if(isTap){
      const rect=colEl.getBoundingClientRect();
      const dir=startY<rect.top+rect.height/2?-1:1;
      let idx=Math.round(-curOff/IH)+dir;
      idx=Math.max(0,Math.min(items.length-1,idx));
      v=apply(listEl,items,-idx*IH);
    }else{
      v=apply(listEl,items,curOff);
    }
    setVal(v);onChange(v);
    if(wasPlaying){wasPlaying=false;m.start();updateBtn(true)}
  });

  // 桌面鼠标拖拽 + 滚轮
  colEl.addEventListener('mousedown',e=>{
    wasPlaying=m.playing;if(wasPlaying){m.stop();updateBtn(false)}
    down=true;startY=e.clientY;startOff=curOff;listEl.style.transition='none';e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!down)return;const dy=e.clientY-startY;
    const maxOff=0,minOff=-(items.length-1)*IH;
    let off=startOff+dy;
    if(off>maxOff)off=maxOff+(off-maxOff)*0.3;
    if(off<minOff)off=minOff+(off-minOff)*0.3;
    curOff=off;listEl.style.transform=`translateY(${off}px)`;
    const idx=Math.round(-off/IH);
    const v=items[Math.max(0,Math.min(items.length-1,idx))];
    listEl.querySelectorAll('.picker-item').forEach(el=>el.classList.toggle('sel',+el.dataset.v===v));
  });
  window.addEventListener('mouseup',()=>{
    if(!down)return;down=false;
    const v=apply(listEl,items,curOff);
    setVal(v);onChange(v);
    if(wasPlaying){wasPlaying=false;m.start();updateBtn(true)}
  });
  colEl.addEventListener('wheel',e=>{
    e.preventDefault();const off=curOff+(e.deltaY>0?IH:-IH);
    const v=apply(listEl,items,off);setVal(v);onChange(v);
  },{passive:false});
}

function midIdx(items,val){
  const mid=Math.floor(items.length/2);
  for(let i=mid;i<items.length;i++){if(items[i]===val)return i}
  for(let i=0;i<mid;i++){if(items[i]===val)return i}
  return 0;
}
buildList(numList,NUM_ITEMS,m.beats);
buildList(denList,DEN_ITEMS,m.noteVal);
// 初始定位在列表中间
const numInit=midIdx(NUM_ITEMS,m.beats),denInit=midIdx(DEN_ITEMS,m.noteVal);
numList.style.transform=`translateY(${-numInit*IH}px)`;
denList.style.transform=`translateY(${-denInit*IH}px)`;
numList.querySelectorAll('.picker-item').forEach(e=>e.classList.toggle('sel',+e.dataset.v===m.beats));
denList.querySelectorAll('.picker-item').forEach(e=>e.classList.toggle('sel',+e.dataset.v===m.noteVal));

setupPicker(numCol,numList,NUM_ITEMS,()=>m.beats,v=>{m.beats=v},v=>{m.beat=0;renderDots()},-numInit*IH);
setupPicker(denCol,denList,DEN_ITEMS,()=>m.noteVal,v=>{m.noteVal=v},()=>{},-denInit*IH);

// --- 表盘旋转 ---
const ANGLE_RANGE=270,ANGLE_START=-135;
function bpmAngle(b){return ANGLE_START+(b-20)/280*ANGLE_RANGE}
function updateInd(){indicator.style.transform=`rotate(${bpmAngle(m.bpm)}deg)`}

let rotating=false,prevA=0,acc=0,wasPlaying=false;
function getAngle(e){
  const r=dial.getBoundingClientRect();
  return Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2))*180/Math.PI+90;
}
dial.addEventListener('touchstart',e=>{
  wasPlaying=m.playing;if(wasPlaying){m.stop();updateBtn(false)}
  rotating=true;prevA=getAngle(e.touches[0]);acc=m.bpm;
},{passive:false});
dial.addEventListener('touchmove',e=>{
  if(!rotating)return;
  let d=getAngle(e.touches[0])-prevA;
  if(d>180)d-=360;if(d<-180)d+=360;
  acc+=d*(280/ANGLE_RANGE);
  let v=Math.round(acc);if(v<20)v=acc=20;if(v>300)v=acc=300;
  if(v!==m.bpm){m.setBpm(v);updateInd();updateBpm()}
  prevA=getAngle(e.touches[0]);
},{passive:false});
function endR(){
  rotating=false;
  if(wasPlaying){wasPlaying=false;m.start();updateBtn(true)}
}
dial.addEventListener('touchend',endR);
dial.addEventListener('touchcancel',endR);
// mouse
dial.addEventListener('mousedown',e=>{
  wasPlaying=m.playing;if(wasPlaying){m.stop();updateBtn(false)}
  rotating=true;prevA=getAngle(e);acc=m.bpm;e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!rotating)return;
  let d=getAngle(e)-prevA;
  if(d>180)d-=360;if(d<-180)d+=360;
  acc+=d*(280/ANGLE_RANGE);
  let v=Math.round(acc);if(v<20)v=acc=20;if(v>300)v=acc=300;
  if(v!==m.bpm){m.setBpm(v);updateInd();updateBpm()}
  prevA=getAngle(e);
});
window.addEventListener('mouseup',()=>{endR()});

// --- 播放 ---
function updateBpm(){num.textContent=m.bpm}
function updateBtn(p){btn.classList.toggle('playing',p)}

// 计时器
const timerEl=$('timer');let timerSec=0,timerInt=null;
function startTimer(){timerSec=0;timerEl.textContent='00:00';timerInt=setInterval(()=>{timerSec++;const m=Math.floor(timerSec/60),s=timerSec%60;timerEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')},1000)}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null}}

// 保存节拍
const saveBtn=$('saveBtn'),presetRow=$('presetRow');

function getPresets(){return JSON.parse(localStorage.getItem('beat_presets')||'[]')}
function renderPresets(){
  const ps=getPresets();
  if(ps.length===0){presetRow.innerHTML='';return}
  presetRow.innerHTML=ps.map((p,i)=>`<div class="preset-card" data-i="${i}"><span>${p.beats}/${p.note}  ${p.bpm}</span></div>`).join('');
  presetRow.querySelectorAll('.preset-card').forEach(card=>{
    let pressTimer;
    card.onclick=()=>{
      const p=ps[+card.dataset.i];
      m.bpm=p.bpm;m.beats=p.beats;m.noteVal=p.note;m.beat=0;
      updateBpm();updateInd();renderDots();
      snapTo(numList,m.beats);snapTo(denList,m.noteVal);
    };
    card.addEventListener('touchstart',()=>{
      pressTimer=setTimeout(()=>{
        const p=ps[+card.dataset.i];
        showConfirm(`删除 ${p.beats}/${p.note} ${p.bpm}？`,()=>{
          const ps2=getPresets();ps2.splice(+card.dataset.i,1);
          localStorage.setItem('beat_presets',JSON.stringify(ps2));
          renderPresets();
        });
      },600);
    });
    card.addEventListener('touchend',()=>clearTimeout(pressTimer));
    card.addEventListener('touchmove',()=>clearTimeout(pressTimer));
    card.addEventListener('mousedown',()=>{
      pressTimer=setTimeout(()=>{
        const p=ps[+card.dataset.i];
        showConfirm(`删除 ${p.beats}/${p.note} ${p.bpm}？`,()=>{
          const ps2=getPresets();ps2.splice(+card.dataset.i,1);
          localStorage.setItem('beat_presets',JSON.stringify(ps2));
          renderPresets();
        });
      },600);
    });
    card.addEventListener('mouseup',()=>clearTimeout(pressTimer));
    card.addEventListener('mouseleave',()=>clearTimeout(pressTimer));
  });
}

function showConfirm(msg,onDel){
  const ov=document.createElement('div');ov.className='confirm-overlay';
  ov.innerHTML=`<div class="confirm-box"><div class="msg">${msg}</div><div class="btns"><button class="btn-cancel">取消</button><button class="btn-del">删除</button></div></div>`;
  ov.querySelector('.btn-cancel').onclick=()=>ov.remove();
  ov.querySelector('.btn-del').onclick=()=>{ov.remove();onDel()};
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  document.body.appendChild(ov);
}

saveBtn.onclick=()=>{
  const ps=getPresets();
  ps.unshift({bpm:m.bpm,beats:m.beats,note:m.noteVal});
  if(ps.length>10)ps.pop();
  localStorage.setItem('beat_presets',JSON.stringify(ps));
  renderPresets();
  presetRow.scrollTop=presetRow.scrollHeight;
};
renderPresets();
function renderDots(){
  dots.innerHTML=Array.from({length:m.beats},(_,i)=>`<div class="beat-dot${i===0?' strong':''}" data-i="${i}"></div>`).join('');
}
m.onBeat=function(i,acc){
  const ds=dots.children;
  for(const d of ds)d.classList.remove('active');
  if(ds[i])ds[i].classList.add('active');
  glow.classList.add('flash');setTimeout(()=>glow.classList.remove('flash'),60);
  if(m.flash&&acc){
    const o=document.createElement('div');
    o.style.cssText='position:fixed;inset:0;background:white;opacity:0.12;pointer-events:none;z-index:999;transition:opacity 0.06s';
    document.body.appendChild(o);
    requestAnimationFrame(()=>{o.style.opacity='0';setTimeout(()=>o.remove(),100)});
  }
  if(m.vib&&acc&&navigator.vibrate)navigator.vibrate(25);
};

btn.onclick=async()=>{
  btn.disabled=true;
  const p=await m.toggle();
  updateBtn(p);renderDots();
  if(!p)for(const d of dots.children)d.classList.remove('active');
  btn.disabled=false;
};


document.onkeydown=e=>{
  if(e.code==='Space'){e.preventDefault();btn.click()}
  if(e.code==='ArrowUp'){e.preventDefault();m.setBpm(m.bpm+1);updateInd();updateBpm()}
  if(e.code==='ArrowDown'){e.preventDefault();m.setBpm(m.bpm-1);updateInd();updateBpm()}
  if(e.code==='ArrowRight'){e.preventDefault();m.setBpm(m.bpm+5);updateInd();updateBpm()}
  if(e.code==='ArrowLeft'){e.preventDefault();m.setBpm(m.bpm-5);updateInd();updateBpm()}
};

renderDots();updateBpm();updateInd();
</script>
</body>
</html>
